# aircraft Service configuration
spring.application.name=aircraft-service
server.port=8081

# database connection
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:aircraft_db}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:aircraft_user}
# pass not hardcoded, db implemented pass. no passwords stored inside all the git
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Run data.sql after Hibernate has created the schema
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
